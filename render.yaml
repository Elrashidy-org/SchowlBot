# Optional Render blueprint. Note: Render's FREE web service sleeps after ~15 min
# idle, which drops the Discord gateway connection. Use a paid instance for a
# reliable bot, or prefer Koyeb's free always-on tier (see DEPLOY.md).
services:
  - type: web
    name: schowlbot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set the rest as secrets in the Render dashboard (do not commit them):
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, DISCORD_TOKEN, DISCORD_CLIENT_ID,
      # DISCORD_OWNER_IDS, CORS_ALLOWED_ORIGINS, RESEND_API_KEY, RESEND_FROM_EMAIL,
      # TURNSTILE_SECRET_KEY, DEFAULT_TIMEZONE, PUBLIC_API_BASE_URL
